function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function fmt(n){return Math.round(n).toLocaleString()+'円';}
function genCustomer(){
  const area=rand(AREAS);
  const tsubo=randInt(28,42);
  const pool=[...CONDS];const conds=[];
  for(let i=0;i<randInt(2,4);i++){const idx=Math.floor(Math.random()*pool.length);conds.push(pool.splice(idx,1)[0]);}
  const sn=rand(SURNAMES),gn=rand(GIVEN);
  const initial=ROMAJI[sn]+'.'+ROMAJI[gn];
  return{name:initial,addr:area.pref+rand(area.cities)+rand(STREETS),tsubo,nensu:randInt(13,32),struct:rand(STRUCTS),conds};
}
